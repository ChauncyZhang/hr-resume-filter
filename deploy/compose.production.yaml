services:
  proxy:
    image: "${FRONTEND_IMAGE:?Set FRONTEND_IMAGE to the frontend repository}@${FRONTEND_IMAGE_DIGEST:?Set FRONTEND_IMAGE_DIGEST to its sha256 digest}"
    ports: !override
      - name: https
        target: 8443
        published: "${HTTPS_PORT:-443}"
        host_ip: "${HTTPS_BIND_ADDRESS:-0.0.0.0}"
        protocol: tcp
        app_protocol: https
    environment:
      NGINX_ENVSUBST_FILTER: "^SERVER_NAME"
      SERVER_NAME: "${SERVER_NAME:?Set SERVER_NAME to the production hostname}"
    volumes: !override
      - type: bind
        source: ./nginx/production.conf.template
        target: /etc/nginx/templates/default.conf.template
        read_only: true
      - type: bind
        source: ./nginx/snippets/security-headers.conf
        target: /etc/nginx/snippets/security-headers.conf
        read_only: true
      - type: bind
        source: "${TLS_CERTIFICATE_PATH:?Set TLS_CERTIFICATE_PATH to the deployed certificate file}"
        target: /etc/nginx/tls/tls.crt
        read_only: true
      - type: bind
        source: "${TLS_PRIVATE_KEY_PATH:?Set TLS_PRIVATE_KEY_PATH to the deployed private-key file}"
        target: /etc/nginx/tls/tls.key
        read_only: true
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-q", "--spider", "https://127.0.0.1:8443/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    image: "${APP_IMAGE:?Set APP_IMAGE to the application repository}@${APP_IMAGE_DIGEST:?Set APP_IMAGE_DIGEST to its sha256 digest}"
    build: !reset null
    environment:
      APP_ENVIRONMENT: production

  worker:
    image: "${APP_IMAGE:?Set APP_IMAGE to the application repository}@${APP_IMAGE_DIGEST:?Set APP_IMAGE_DIGEST to its sha256 digest}"
    build: !reset null
    environment:
      APP_ENVIRONMENT: production
