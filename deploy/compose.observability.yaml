services:
  minio:
    environment:
      MINIO_PROMETHEUS_AUTH_TYPE: public

  observability-role-provision:
    image: postgres:16.9-alpine
    environment:
      PGHOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      QUEUE_METRICS_DB_USER: ${QUEUE_METRICS_DB_USER:?Set QUEUE_METRICS_DB_USER to the queue metrics login}
      QUEUE_METRICS_DB_PASSWORD: ${QUEUE_METRICS_DB_PASSWORD:?Set QUEUE_METRICS_DB_PASSWORD to the queue metrics password}
      POSTGRES_EXPORTER_DB_USER: ${POSTGRES_EXPORTER_DB_USER:?Set POSTGRES_EXPORTER_DB_USER to the postgres exporter login}
      POSTGRES_EXPORTER_DB_PASSWORD: ${POSTGRES_EXPORTER_DB_PASSWORD:?Set POSTGRES_EXPORTER_DB_PASSWORD to the postgres exporter password}
    volumes:
      - ./observability/provision-roles.sh:/opt/ux09/provision-observability-roles.sh:ro
    command: ["sh", "/opt/ux09/provision-observability-roles.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks: [private]

  queue-exporter:
    build:
      context: ..
      dockerfile: server/Dockerfile
      target: runtime
    command: ["python", "-m", "server.app.observability.exporter"]
    environment:
      OBSERVABILITY_DATABASE_URL: postgresql://${QUEUE_METRICS_DB_USER:?Set QUEUE_METRICS_DB_USER to the queue metrics login}:${QUEUE_METRICS_DB_PASSWORD:?Set QUEUE_METRICS_DB_PASSWORD to the queue metrics password}@postgres:5432/${POSTGRES_DB}
      OBSERVABILITY_EXPORTER_PORT: "9108"
    depends_on:
      observability-role-provision:
        condition: service_completed_successfully
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp]
    networks: [private]

  prometheus:
    image: prom/prometheus:v3.5.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alerts:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    depends_on:
      api:
        condition: service_healthy
      queue-exporter:
        condition: service_started
      alertmanager:
        condition: service_started
    restart: unless-stopped
    networks: [private]

  alertmanager:
    image: prom/alertmanager:v0.28.1
    command: ["--config.file=/etc/alertmanager/alertmanager.yml", "--storage.path=/alertmanager"]
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    restart: unless-stopped
    networks: [private]

  node-exporter:
    image: prom/node-exporter:v1.9.1
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    restart: unless-stopped
    networks: [private]

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_EXPORTER_DB_USER:?Set POSTGRES_EXPORTER_DB_USER to the postgres exporter login}:${POSTGRES_EXPORTER_DB_PASSWORD:?Set POSTGRES_EXPORTER_DB_PASSWORD to the postgres exporter password}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      observability-role-provision:
        condition: service_completed_successfully
    restart: unless-stopped
    networks: [private]

volumes:
  prometheus-data:
  alertmanager-data:
