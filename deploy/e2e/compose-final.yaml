services:
  proxy:
    ports: !override
      - "${E2E_API_PORT:?E2E_API_PORT is required}:8080"

  api:
    image: ${E2E_APP_IMAGE:?E2E_APP_IMAGE is required}
    depends_on:
      e2e-final-prepare:
        condition: service_completed_successfully

  worker:
    image: ${E2E_APP_IMAGE:?E2E_APP_IMAGE is required}
    depends_on:
      e2e-final-prepare:
        condition: service_completed_successfully

  e2e-final-prepare:
    image: ${E2E_APP_IMAGE:?E2E_APP_IMAGE is required}
    build:
      context: ..
      dockerfile: server/Dockerfile
      target: runtime
    command:
      - sh
      - -c
      - python -m alembic -c server/alembic.ini upgrade head && python /opt/ux09/e2e/prepare-final.py
    environment:
      PYTHONPATH: /opt/ux09
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      OBJECT_STORAGE_ENDPOINT: minio:9000
      OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
      OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-resumes}
      E2E_ADMIN_EMAIL: ${E2E_ADMIN_EMAIL:?E2E_ADMIN_EMAIL is required}
      E2E_ADMIN_PASSWORD: ${E2E_ADMIN_PASSWORD:?E2E_ADMIN_PASSWORD is required}
      E2E_INTERVIEWER_EMAIL: ${E2E_INTERVIEWER_EMAIL:?E2E_INTERVIEWER_EMAIL is required}
      E2E_INTERVIEWER_PASSWORD: ${E2E_INTERVIEWER_PASSWORD:?E2E_INTERVIEWER_PASSWORD is required}
      E2E_JOB_TITLE: ${E2E_JOB_TITLE:?E2E_JOB_TITLE is required}
    volumes:
      - ./e2e/prepare-final.py:/opt/ux09/e2e/prepare-final.py:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: "no"
    networks: [private]
